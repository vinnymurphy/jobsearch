[tool.ruff]
# Match the standard Black line length
line-length = 78
target-version = "py313"

[tool.ruff.lint]
# E: Error, F: Pyflakes, I: Isort, N: PEP8-naming, UP: PyUpgrade
select = ["E", "F", "I", "N", "UP"]
ignore = []

[tool.ruff.lint.isort]
# Ensures 'jobs' is treated as a local app import, not a third-party library
known-first-party = ["jobs"]
section-order = [
    "first-party", 
    "future", 
    "local-folder",
    "standard-library", 
    "third-party" 
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
