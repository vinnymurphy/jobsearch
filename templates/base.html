<!DOCTYPE html>
<html lang="en">
<head>
  <title>JobSearch | RelOps Dashboard</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

  <style>
    /* Custom RelOps Styling */
    .navbar { margin-bottom: 30px; border-radius: 0; }
    footer { background-color: #f2f2f2; padding: 25px; margin-top: 50px; }
    .main-content { min-height: 80vh; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'dashboard' %}">JobSearch Ops</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#myNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="myNavbar">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'job_calendar' %}">Calendar</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'job_create' %}">Add Job</a></li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><span class="nav-link text-light">Logged in: vmurphy</span></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container main-content">
  {% block content %}
  {% endblock %}
</div>

<footer class="container-fluid text-center">
  <p>JobSearch Management System | Build Version 1.0.4</p>
</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
