
{% extends "base.html" %}
{% block content %}

<h2>{% if form.initial.applied_date %}Add Job for {{ form.initial.applied_date }}{% else %}Add New Job{% endif %}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Job</button>
</form>

<a href="{% url 'job_calendar' %}">Cancel and Return to Calendar</a>
{% endblock %}
{% block extra_js %}
<script>
    $(document).ready(function() {
        // Re-init your Select2 autocomplete here
        $('.select2-enable').select2({ width: '100%' });
    });
</script>
{% endblock %}
